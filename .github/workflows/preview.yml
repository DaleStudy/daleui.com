name: Preview 🔍

on:
  pull_request:

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      # 댓글에 표시할 짧은 커밋 해시와 UTC 시각 계산
      - name: Prepare commit metadata
        id: commit
        run: |
          echo "short_sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-8)" >> "$GITHUB_OUTPUT"
          echo "now=$(date -u '+%b %d %Y, %I:%M %p')" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build

      # 배포 시작 시점에 "In progress" 상태로 댓글을 먼저 남김(갱신)
      - name: Render in-progress comment
        env:
          STATUS: 🔵 In progress
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHORT_SHA: ${{ steps.commit.outputs.short_sha }}
          PREVIEW_URL: "-"
          NOW: ${{ steps.commit.outputs.now }}
        run: envsubst < .github/preview-comment.md > comment.md
      - name: Comment build in progress
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cloudflare-workers
          path: comment.md

      - name: Upload preview version to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "94480614a6df7731f1e4491bdac5c440"
          packageManager: bun
          # 프로덕션을 건드리지 않는 미리보기(Preview URL) 버전 업로드
          command: versions upload

      # 배포 완료 후 동일 댓글을 성공 상태로 갱신(sticky)하여 댓글이 쌓이지 않도록 함
      - name: Render ready comment
        env:
          STATUS: ✅ Ready
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHORT_SHA: ${{ steps.commit.outputs.short_sha }}
          PREVIEW_URL: <a href='${{ steps.deploy.outputs.deployment-url }}'>Commit Preview URL</a>
          NOW: ${{ steps.commit.outputs.now }}
        run: envsubst < .github/preview-comment.md > comment.md
      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: cloudflare-workers
          path: comment.md
